<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منهجي | المراجعة الذكية</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0056b3; --secondary: #00a8cc; --accent: #ff6b6b; 
            --dark: #2c3e50; --light: #f4f7f6; --white: #ffffff; 
            --success: #28a745; --danger: #dc3545; --text-muted: #7f8c8d;
            --gradient: linear-gradient(135deg, #0056b3, #00a8cc);
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--light); margin: 0; padding: 0; color: var(--dark); }
        .eng-text { font-family: 'Poppins', sans-serif; direction: ltr; text-align: left; }
        .ar-text { font-family: 'Cairo', sans-serif; direction: rtl; text-align: right; }
        
        /* ---------------- الهيدر الثابت الموحد ---------------- */
        header { background: var(--white); padding: 12px 5%; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        
        /* حجم اللوجو الجديد */
        .custom-logo { width: 85px; height: 85px; object-fit: contain; margin-left: 5px; }
        
        .logo-text h1 { font-family: 'Poppins', sans-serif; font-size: 1.5rem; color: var(--primary); margin: 0;}
        .logo-text p { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin: 0;}
        .header-btn { background: var(--light); color: var(--primary); border: 1px solid var(--secondary); padding: 8px 15px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; font-size: 0.9rem;}
        .header-btn:hover { background: var(--primary); color: var(--white); }
        
        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; min-height: 60vh;}
        
        .lesson-title-area { background: var(--gradient); color: var(--white); padding: 25px 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .lesson-title-area h2 { font-size: 1.8rem; margin: 0 0 10px 0; }
        .lesson-title-area p { font-size: 1rem; margin: 0; opacity: 0.9; background: rgba(0,0,0,0.15); padding: 8px 15px; border-radius: 8px; display: inline-block; }
        
        .nav-controls { display: flex; gap: 10px; }
        .nav-controls button { background-color: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-controls button:hover:not(:disabled) { background-color: var(--white); color: var(--primary); transform: translateY(-2px); }
        .nav-controls button:disabled { opacity: 0.4; cursor: not-allowed; }

        .chapter-container { display: none; animation: fadeIn 0.4s ease; }
        .chapter-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .tab-btn { background-color: var(--white); border: 2px solid var(--secondary); color: var(--secondary); padding: 8px 20px; font-size: 1rem; font-weight: 600; border-radius: 25px; cursor: pointer; transition: all 0.3s ease; font-family: 'Cairo', sans-serif; }
        .tab-btn:hover, .tab-btn.active { background-color: var(--secondary); color: var(--white); box-shadow: 0 4px 10px rgba(0, 168, 204, 0.3); }
        
        .section-content { display: none; }
        .section-content.active { display: block; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; align-items: start; }
        .card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-top: 4px solid var(--secondary); transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-7px); box-shadow: 0 12px 25px rgba(0,0,0,0.12); }
        .q-number { position: absolute; top: -15px; left: 20px; background: var(--accent); color: var(--white); padding: 5px 15px; border-radius: 20px; font-weight: 700; font-family: 'Poppins', sans-serif; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(255, 107, 107, 0.4); }
        
        .card-passage { background: #fffcf2; padding: 15px; border-radius: 8px; border-right: 4px solid #f1c40f; margin-bottom: 15px; font-weight: 700; color: #d35400; line-height: 1.8; text-align: center; font-size: 1.1rem; }
        .card-image { width: 100%; border-radius: 8px; margin-bottom: 15px; border: 2px solid #eee; object-fit: cover; max-height: 200px;}
        
        .question-eng { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-top: 15px; margin-bottom: 8px; }
        .question-ar { font-size: 1rem; color: var(--text-muted); margin-bottom: 15px; border-right: 3px solid var(--secondary); padding-right: 10px; }
        
        .toggle-btn { background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-family: 'Cairo', sans-serif; font-weight: 600; transition: 0.3s; text-align: center; width: 100%; margin-top: auto; }
        .toggle-btn:hover { background: var(--primary); color: var(--white); }
        
        .answer-container { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.5s ease, opacity 0.5s ease, margin-top 0.3s ease; }
        .answer-container.show { max-height: 800px; opacity: 1; margin-top: 15px; }
        .answer-eng { font-size: 1.05rem; font-weight: 600; padding: 12px; border-radius: 8px; background-color: #f8f9fa; border-left: 4px solid var(--success); margin-bottom: 10px; }
        .answer-ar { font-size: 1rem; font-weight: 600; color: var(--dark); margin-bottom: 10px; }
        .explanation { font-size: 0.95rem; line-height: 1.6; color: #444; background: #e9f7ef; padding: 12px; border-radius: 8px; border-right: 3px solid var(--success); }
        
        .text-success { color: var(--success) !important; }
        .text-danger { color: var(--danger) !important; }
        .border-danger { border-left-color: var(--danger) !important; }
        
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 60px; height: 60px; border: 6px solid var(--light); border-top: 6px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        footer { background: var(--dark); color: var(--white); text-align: center; padding: 20px; font-size: 1rem; margin-top: 40px;}

        @media (max-width: 768px) {
            .lesson-title-area { flex-direction: column; text-align: center; }
            .nav-controls { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><h2 style="font-family: 'Cairo'; color: var(--primary); margin-top: 10px;">جاري تحضير المراجعة...</h2></div>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="شعار منهجي" class="custom-logo">
            <div class="logo-text">
                <h1>Manhaaji</h1>
                <p>طريقك لفهم المنهج وإتقان العلم</p>
            </div>
        </a>
        <button class="header-btn" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> العودة للرئيسية</button>
    </header>

    <div class="container" id="main-content" style="display: none;">
        <div class="lesson-title-area">
            <div style="text-align: right;" class="ar-text">
                <h2 id="chapterTitle"><i class="fas fa-book-open"></i> جاري التحميل...</h2>
                <p id="pageSubtitle">المراجعة الذكية</p>
            </div>
            <div class="nav-controls">
                <button id="prevBtn" onclick="changeChapter(-1)"><i class="fas fa-chevron-right"></i> السابق</button>
                <button id="nextBtn" onclick="changeChapter(1)">التالي <i class="fas fa-chevron-left"></i></button>
            </div>
        </div>

        <div id="chapters-wrapper"></div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 منصة منهجي (Manhaaji.com) | تصميم وتطوير مازن خالد</p>
    </footer>

    <script>
        let chaptersData = [];
        let chaptersTitles = {};
        let currentChapter = 1;
        let totalChapters = 1;
        
        const defaultTabs = [
            { key: 'definitions', label: 'Definitions' },
            { key: 'tf', label: 'True/False' },
            { key: 'mcq', label: 'MCQ' },
            { key: 'complete', label: 'Complete' },
            { key: 'list', label: 'List' }
        ];
        let currentTabs = defaultTabs;

        window.onload = function() {
            document.getElementById('loader').style.display = 'flex';
            const urlParams = new URLSearchParams(window.location.search);
            const subject = urlParams.get('subject'); 
            const requestedCh = parseInt(urlParams.get('ch'));

            if (!subject) {
                alert("خطأ: لم يتم تحديد المادة!");
                window.location.href = 'index.html';
                return;
            }

            const script = document.createElement('script');
            script.src = `data/${subject}.js`;
            
            script.onload = function() {
                if (window.revisionData && window.revisionData.chapters) {
                    chaptersData = window.revisionData.chapters;
                    chaptersTitles = window.revisionData.chaptersTitles;
                    totalChapters = chaptersData.length - 1; 
                    
                    if(window.revisionData.tabs) {
                        currentTabs = window.revisionData.tabs;
                    }
                    
                    document.getElementById('pageSubtitle').innerText = window.revisionData.pageTitle;

                    if(requestedCh && requestedCh >= 1 && requestedCh <= totalChapters) {
                        currentChapter = requestedCh;
                    }

                    buildAllChapters();
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    showChapter(currentChapter);
                } else {
                    alert("خطأ في قراءة بيانات المراجعة.");
                }
            };
            script.onerror = function() { 
                alert("عفواً، بيانات هذه المادة غير متوفرة حالياً."); 
                window.location.href = 'index.html';
            };
            document.head.appendChild(script);
        };

        function buildAllChapters() {
            const container = document.getElementById('chapters-wrapper');
            let html = '';

            for(let i = 1; i <= totalChapters; i++) {
                const ch = chaptersData[i];
                if(!ch) continue;

                let tabsButtonsHtml = '';
                let tabsContentHtml = '';

                currentTabs.forEach((tab, index) => {
                    const isActive = index === 0 ? 'active' : '';
                    tabsButtonsHtml += `<button class="tab-btn ${isActive}" onclick="switchTab('${tab.key}-${i}', this, ${i})">${tab.label}</button>`;
                    
                    tabsContentHtml += `<div id="${tab.key}-${i}" class="section-content ${isActive}"><div class="cards-grid">${buildCards(ch[tab.key], tab.key)}</div></div>`;
                });

                html += `
                <div id="chapter-${i}" class="chapter-container">
                    <div class="tabs">${tabsButtonsHtml}</div>
                    ${tabsContentHtml}
                </div>`;
            }
            container.innerHTML = html;
        }

        function buildCards(dataArray, type) {
            if(!dataArray || dataArray.length === 0) return `<h3 style="text-align:center; width:100%; color:#777; margin-top: 40px;">عفواً، جاري إضافة تدريبات هذا القسم.</h3>`;
            
            let html = '';
            dataArray.forEach((item, index) => {
                
                let optionsHtml = '';
                if (item.options) {
                    optionsHtml = '<div style="margin-top:15px; font-weight:600; line-height:1.8; font-size: 1.05rem; color: var(--primary); text-align: right; direction: rtl;">' + item.options.map(o => `<div style="background:#f4f8fb; padding:8px 15px; border-radius:8px; margin-bottom:8px; border:1px solid #e0e0e0;">${o}</div>`).join('') + '</div>';
                }

                let answerColorClass = 'text-success';
                let borderClass = '';
                let iconClass = 'fa-check';
                if(type === 'tf') {
                    answerColorClass = item.isCorrect ? 'text-success' : 'text-danger';
                    borderClass = item.isCorrect ? '' : 'border-danger';
                    iconClass = item.isCorrect ? 'fa-check' : 'fa-times';
                }

                let mediaSection = '';
                if (item.image) {
                    mediaSection += `<img src="${item.image}" alt="صورة توضيحية" class="card-image">`;
                }
                if (item.passage) {
                    mediaSection += `<div class="card-passage">${item.passage.replace(/\n/g, '<br>')}</div>`;
                }

                let questionSection = '';
                let answerSection = '';

                if (item.q_eng && item.q_eng.trim() !== "") {
                    questionSection = `<div class="question-eng eng-text">${item.q_eng} ${optionsHtml}</div><div class="question-ar ar-text">${item.q_ar}</div>`;
                    answerSection = `<div class="answer-eng eng-text ${answerColorClass} ${borderClass}"><i class="fas ${iconClass}"></i> Answer: <br> ${item.a_eng}</div><div class="answer-ar ar-text">${item.a_ar}</div>`;
                } else {
                    questionSection = `
                        ${mediaSection}
                        <div class="question-ar ar-text" style="font-size: 1.25rem; border: none; padding: 0; color: var(--primary); font-weight: 800; text-align: center; margin-bottom: 15px; line-height: 1.6;">
                            ${item.q_ar}
                        </div>
                        ${optionsHtml}
                    `;
                    answerSection = `
                        <div class="answer-ar ar-text ${answerColorClass}" style="font-size: 1.2rem; text-align: center; border-right: 4px solid; padding-right: 15px; ${borderClass}; margin-top: 10px;">
                            <i class="fas ${iconClass}"></i> الإجابة: ${item.a_ar}
                        </div>
                    `;
                }

                html += `
                <div class="card">
                    <span class="q-number">${index + 1}</span>
                    ${questionSection}
                    <button class="toggle-btn ar-text" onclick="toggleAnswer(this)">إظهار الإجابة <i class="fas fa-chevron-down"></i></button>
                    <div class="answer-container">
                        ${answerSection}
                        ${item.exp ? `<div class="explanation ar-text" style="margin-top: 15px;"><i class="fas fa-lightbulb"></i> <strong>الشرح:</strong> ${item.exp}</div>` : ''}
                    </div>
                </div>`;
            });
            return html;
        }

        function toggleAnswer(btn) {
            const answerDiv = btn.nextElementSibling;
            if (answerDiv.classList.contains('show')) {
                answerDiv.classList.remove('show');
                btn.innerHTML = 'إظهار الإجابة <i class="fas fa-chevron-down"></i>';
                btn.style.backgroundColor = 'transparent'; btn.style.color = 'var(--primary)';
            } else {
                answerDiv.classList.add('show');
                btn.innerHTML = 'إخفاء الإجابة <i class="fas fa-chevron-up"></i>';
                btn.style.backgroundColor = 'rgba(0, 86, 179, 0.1)'; btn.style.color = 'var(--primary)';
            }
        }

        function switchTab(sectionId, btn, chapterNum) {
            document.querySelectorAll(`#chapter-${chapterNum} .section-content`).forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`#chapter-${chapterNum} .tab-btn`).forEach(el => el.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
        }

        function showChapter(chapterNum) {
            document.querySelectorAll('.chapter-container').forEach(el => el.classList.remove('active'));
            const chapterEl = document.getElementById(`chapter-${chapterNum}`);
            if(chapterEl) chapterEl.classList.add('active');
            
            const titleText = chaptersTitles[chapterNum] || `الوحدة ${chapterNum}`;
            document.getElementById('chapterTitle').innerHTML = `<i class="fas fa-book-open"></i> ${titleText}`;
            
            document.getElementById('prevBtn').disabled = (chapterNum === 1);
            document.getElementById('nextBtn').disabled = (chapterNum === totalChapters);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeChapter(direction) {
            const newChapter = currentChapter + direction;
            if (newChapter >= 1 && newChapter <= totalChapters) {
                currentChapter = newChapter;
                const url = new URL(window.location);
                url.searchParams.set('ch', currentChapter);
                window.history.pushState({}, '', url);
                showChapter(currentChapter);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة | منصة منهجي</title>
    
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0056b3; 
            --secondary: #00a8cc; 
            --dark: #121212; 
            --light: #f4f7f6; 
            --white: #ffffff;
            --accent: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #ffffff 0%, #eef2f5 100%);
        }

        .error-container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        .logo-container {
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0, 86, 179, 0.2));
        }

        /* تصميم سينمائي فخم لرقم 404 */
        .error-code {
            font-family: 'Poppins', sans-serif;
            font-size: 12rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 15px 30px rgba(0, 86, 179, 0.2);
            animation: float 4s ease-in-out infinite;
            position: relative;
        }

        .error-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--dark);
            margin-top: -10px;
            margin-bottom: 15px;
            animation: fadeInUp 0.8s ease 0.2s forwards;
            opacity: 0;
        }

        .error-message {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            animation: fadeInUp 0.8s ease 0.4s forwards;
            opacity: 0;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 35px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.3);
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease 0.6s forwards;
            opacity: 0;
        }

        .btn-home:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 86, 179, 0.4);
            color: var(--white);
        }

        /* تأثيرات الحركة (Animations) */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* خلفية مزخرفة خفيفة */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(0, 86, 179, 0.05), rgba(0, 168, 204, 0.05));
            border-radius: 50%;
        }

        .shape-1 { width: 300px; height: 300px; top: -100px; right: -50px; }
        .shape-2 { width: 500px; height: 500px; bottom: -200px; left: -150px; }

        @media (max-width: 768px) {
            .error-code { font-size: 8rem; }
            .error-title { font-size: 1.8rem; }
            .error-message { font-size: 1.1rem; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="error-container">
        <a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="شعار منهجي">
        </a>
        
        <h1 class="error-code">404</h1>
        <h2 class="error-title">عذراً، ضللت الطريق!</h2>
        <p class="error-message">
            الصفحة التي تبحث عنها غير موجودة، ربما تم تغيير رابطها أو تم حذفها. لا تقلق، يمكنك العودة إلى بر الأمان ومواصلة المذاكرة.
        </p>
        
        <a href="index.html" class="btn-home">
            <i class="fas fa-home"></i> العودة للرئيسية
        </a>
    </div>

</body>
</html>
